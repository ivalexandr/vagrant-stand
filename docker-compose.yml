services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: moodle
      POSTGRES_USER: moodle
      POSTGRES_PASSWORD: moodle

  moodle:
    image: erseco/alpine-moodle
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: Password123
      SITE_URL: http://localhost:8080
    depends_on:
      - postgres
